<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="vault-token" content="__VAULT_TOKEN__">
<title>Vault</title>
<script src="/argon2.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #08080c;
  --surface: #101014;
  --border:  #1e1e28;
  --text:    #e0e0e8;
  --muted:   #50505e;
  --accent:  #4a9eff;
  --danger:  #e05555;
  --ok:      #50c878;
  --warn:    #e0c055;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: ui-monospace, 'SF Mono', 'Cascadia Code', monospace;
  font-size: 13px;
  line-height: 1.6;
  padding: 32px 24px;
}

/* ── Header ──────────────────────────────────────────── */

.vault-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
  max-width: 660px;
}

h1 {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  background: linear-gradient(120deg, var(--accent) 0%, #a0c8ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  flex: 1;
}

#session-countdown {
  font-size: 10px;
  color: var(--muted);
  display: none;
  white-space: nowrap;
  letter-spacing: 0.04em;
}

#lock-btn {
  display: none;
  font-size: 11px;
  padding: 4px 10px;
}

/* ── Cards ───────────────────────────────────────────── */

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 22px;
  margin-bottom: 12px;
  max-width: 660px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.45);
  transition: box-shadow 0.2s;
}

.card-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--muted);
  margin-bottom: 14px;
}

/* ── Labels & layout ─────────────────────────────────── */

label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; letter-spacing: 0.04em; }

.row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* ── Inputs ──────────────────────────────────────────── */

input[type="password"],
input[type="file"],
input[type="url"] {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 8px 12px;
  font-family: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}

input[type="password"]:focus,
input[type="url"]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(74,158,255,0.1);
}

/* ── Buttons ─────────────────────────────────────────── */

button {
  background: #18181f;
  border: 1px solid #28283a;
  border-radius: 6px;
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  padding: 6px 14px;
  white-space: nowrap;
  transition: background 0.15s, border-color 0.15s, box-shadow 0.15s, color 0.15s, opacity 0.15s;
  letter-spacing: 0.02em;
}

button:hover:not(:disabled) {
  background: #202030;
  border-color: #36364e;
}

button:disabled { opacity: 0.35; cursor: not-allowed; }

.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
  font-weight: 700;
}

.primary:hover:not(:disabled) {
  background: #6ab4ff;
  border-color: #6ab4ff;
  box-shadow: 0 0 18px rgba(74,158,255,0.3);
}

.ghost {
  background: transparent;
  border-color: var(--border);
  color: var(--muted);
}

.ghost:hover:not(:disabled) {
  color: var(--text);
  border-color: #30303e;
  background: rgba(255,255,255,0.04);
}

.danger {
  background: transparent;
  border-color: transparent;
  color: var(--muted);
}

.danger:hover:not(:disabled) {
  background: rgba(224,85,85,0.1);
  border-color: var(--danger);
  color: var(--danger);
}

/* ── Strength bar ─────────────────────────────────────── */

#pw-strength-wrap { display: none; margin-top: 8px; }

#pw-strength-track {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

#pw-strength-bar {
  height: 100%;
  width: 0;
  transition: width 0.2s, background-color 0.2s;
  border-radius: 2px;
}

#pw-strength-label {
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
  letter-spacing: 0.04em;
}

/* ── Progress bar ─────────────────────────────────────── */

.progress {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 12px;
  overflow: hidden;
  display: none;
}

.progress-bar {
  height: 100%;
  background: var(--accent);
  width: 0;
  transition: width 0.25s;
  border-radius: 2px;
}

/* ── Status message ───────────────────────────────────── */

.status {
  font-size: 11px;
  margin-top: 8px;
  min-height: 16px;
  color: var(--text);
  letter-spacing: 0.02em;
}

.status.ok   { color: var(--ok); }
.status.err  { color: var(--danger); }
.status.warn { color: var(--warn); }

/* ── File list ────────────────────────────────────────── */

#file-list { list-style: none; }

#file-list li {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  margin: 0 -10px;
  border-radius: 7px;
  transition: background 0.12s;
}

#file-list li:hover { background: rgba(255,255,255,0.04); }

.fname {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--muted);
  font-size: 12px;
}

.fname.named { color: var(--text); }

#empty-msg { color: var(--muted); padding: 6px 0; font-size: 12px; }

/* ── Timeout notice ───────────────────────────────────── */

#timeout-notice {
  display: none;
  background: rgba(74,158,255,0.08);
  border: 1px solid rgba(74,158,255,0.22);
  border-radius: 8px;
  color: var(--accent);
  font-size: 11px;
  padding: 9px 14px;
  margin-bottom: 16px;
  max-width: 660px;
  letter-spacing: 0.03em;
}

/* ── Viewer overlay ───────────────────────────────────── */

#viewer {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 200;
  overflow-y: auto;
  padding: 28px 20px;
}

#viewer.open { display: flex; justify-content: center; align-items: flex-start; }

#vbox {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 100%;
  max-width: 920px;
  padding: 20px 22px;
  box-shadow: 0 8px 48px rgba(0,0,0,0.7);
}

#vhead {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  gap: 12px;
}

#vname {
  font-size: 13px;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}

#vloading { color: var(--muted); padding: 40px 0; text-align: center; font-size: 12px; }

#vcontent img  { max-width: 100%; max-height: 82vh; display: block; margin: 0 auto; border-radius: 6px; }
#vcontent audio,
#vcontent video { width: 100%; border-radius: 6px; }
#vcontent embed { width: 100%; height: 82vh; display: block; border-radius: 6px; }
#vcontent pre  {
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 82vh;
  overflow: auto;
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 16px;
  border-radius: 8px;
  font-size: 12px;
  line-height: 1.7;
  color: var(--text);
}
#vcontent .dl-msg { color: var(--muted); padding: 30px 0; font-size: 12px; text-align: center; }

/* ── Virtual keyboard ─────────────────────────────────── */

#vkb-panel {
  display: none;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  -webkit-user-select: none;
  user-select: none;
}

#vkb-panel.open { display: flex; }

.vk-key {
  font-size: 12px;
  padding: 5px 7px;
  min-width: 30px;
  text-align: center;
  background: #18181f;
  border: 1px solid #28283a;
  border-radius: 5px;
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
  transition: background 0.1s, border-color 0.1s;
}

.vk-key:hover { background: #202030; border-color: #36364e; }
.vk-bs    { color: var(--danger); min-width: 42px; }
.vk-clear { color: var(--muted);  min-width: 42px; font-size: 11px; }

#vkb-counter { font-size: 11px; color: var(--muted); margin-top: 6px; min-height: 16px; letter-spacing: 0.04em; }

</style>
</head>
<body>

<div id="timeout-notice">Session cleared after inactivity — re-enter your password to continue.</div>


<div class="vault-header">
  <h1>⬡ Vault</h1>
  <span id="session-countdown"></span>
  <button class="ghost" id="lock-btn" title="Lock the vault immediately">Lock Now</button>
</div>

<div class="card">
  <div class="card-title">Password</div>
  <div class="row">
    <input type="password" id="pw" placeholder="Master password" autocomplete="off" spellcheck="false" style="flex:1">
    <button class="ghost" id="vkb-btn" title="Virtual keyboard (shuffled on each open)">⌨</button>
  </div>
  <div id="pw-strength-wrap">
    <div id="pw-strength-track"><div id="pw-strength-bar"></div></div>
    <div id="pw-strength-label"></div>
  </div>
  <div id="vkb-panel"></div>
  <div id="vkb-counter"></div>
</div>

<div class="card">
  <div class="card-title">Upload</div>
  <input type="file" id="picker" multiple>
  <div class="row" style="margin-top:10px">
    <button class="primary" id="upload-btn">Encrypt &amp; Upload</button>
  </div>

  <div style="border-top:1px solid var(--border);margin:14px 0"></div>

  <label for="url-input">Fetch from URL</label>
  <div class="row" style="margin-top:4px">
    <input type="url" id="url-input" placeholder="https://example.com/photo.jpg" style="flex:1">
    <button class="primary" id="url-btn">Fetch &amp; Encrypt</button>
  </div>

  <div class="progress" id="prog"><div class="progress-bar" id="bar"></div></div>
  <div class="status" id="up-status"></div>
</div>

<div class="card">
  <div class="row" style="margin-bottom:12px">
    <span class="card-title" style="margin:0;flex:1">Files</span>
    <button class="ghost" id="reveal-btn" title="Decrypt filenames for all listed files">Reveal Names</button>
    <button class="ghost" id="refresh-btn" title="Reload file list">↺ Refresh</button>
  </div>
  <p id="empty-msg">No files uploaded yet.</p>
  <ul id="file-list"></ul>
</div>

<div class="card" id="trash-card" style="display:none">
  <div class="row" style="margin-bottom:12px">
    <span class="card-title" style="margin:0;flex:1">Trash</span>
    <button class="ghost" id="trash-refresh-btn" title="Reload trash">&#8635; Refresh</button>
  </div>
  <p id="trash-empty-msg" style="color:var(--muted);padding:6px 0;font-size:12px">Trash is empty.</p>
  <ul id="trash-list" style="list-style:none"></ul>
</div>

<!-- Viewer -->
<div id="viewer">
  <div id="vbox">
    <div id="vhead">
      <span id="vname">…</span>
      <button id="vclose">Close</button>
    </div>
    <div id="vloading">Decrypting…</div>
    <div id="vcontent"></div>
  </div>
</div>

<script>
'use strict';

// ── Constants ─────────────────────────────────────────────────────────────────

const SESSION_MS  = 60 * 1000;   // 1-minute inactivity lock
const TRASH_DAYS = 7;
const PBKDF2_ITER = 210_000;
const ENC = new TextEncoder();
const DEC = new TextDecoder();
const VAULT_TOKEN = (document.querySelector('meta[name="vault-token"]') || {}).content || '';

// ── Auth helper ───────────────────────────────────────────────────────────────

function authHeaders(extra) {
  return Object.assign({ 'Authorization': `Bearer ${VAULT_TOKEN}` }, extra || {});
}

// ── Password entropy ──────────────────────────────────────────────────────────

function passwordEntropy(pw) {
  if (!pw) return 0;
  let charset = 0;
  if (/[a-z]/.test(pw)) charset += 26;
  if (/[A-Z]/.test(pw)) charset += 26;
  if (/[0-9]/.test(pw)) charset += 10;
  if (/[^a-zA-Z0-9]/.test(pw)) charset += 32;
  return charset > 0 ? Math.log2(charset) * pw.length : 0;
}

function updateStrengthBar(pw) {
  const wrap  = document.getElementById('pw-strength-wrap');
  const bar   = document.getElementById('pw-strength-bar');
  const label = document.getElementById('pw-strength-label');
  if (!pw) {
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = '';
  const bits = passwordEntropy(pw);
  let pct, color, text;
  if      (bits < 40) { pct = 12;  color = 'var(--danger)'; text = `Weak — ${bits.toFixed(0)} bits`; }
  else if (bits < 60) { pct = 35;  color = '#e08855';       text = `Fair — ${bits.toFixed(0)} bits (min 60 required)`; }
  else if (bits < 80) { pct = 65;  color = 'var(--warn)';   text = `Good — ${bits.toFixed(0)} bits`; }
  else                { pct = 100; color = 'var(--ok)';      text = `Strong — ${bits.toFixed(0)} bits`; }
  bar.style.width      = pct + '%';
  bar.style.background = color;
  label.style.color    = color;
  label.textContent    = text;
}

// ── Size padding ──────────────────────────────────────────────────────────────

const META_PAD      = 512;
const ENC_CHUNK_SIZE = 64 * 1024 * 1024;  // 64 MiB — v3 chunk boundary

function paddedSize(n) {
  if (n === 0) return 4096;
  const LARGE = 128 * 1024 * 1024;
  const CHUNK =  16 * 1024 * 1024;
  if (n >= LARGE) return Math.ceil(n / CHUNK) * CHUNK;
  let p = 4096;
  while (p < n) p *= 2;
  return p;
}

// ── In-session name cache  (id → {name, mime}) ────────────────────────────────

const cache = Object.create(null);

// ── Key derivation ────────────────────────────────────────────────────────────

async function _deriveKeyArgon2(password, salt) {
  if (typeof argon2 === 'undefined')
    throw new Error('Argon2 library not loaded. See README for download command.');
  const result = await argon2.hash({
    pass: password,
    salt: salt,
    time: 3,
    mem: 32768,   // 32 MiB — ~3–6s in browser; ~50,000× harder than PBKDF2 per guess
    hashLen: 32,
    parallelism: 1,
    type: argon2.ArgonType.Argon2id,
  });
  return crypto.subtle.importKey(
    'raw', result.hash,
    { name: 'AES-GCM', length: 256 },
    false, ['encrypt', 'decrypt']
  );
}

async function _deriveKeyPBKDF2(password, salt) {
  const raw = await crypto.subtle.importKey(
    'raw', ENC.encode(password), 'PBKDF2', false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: PBKDF2_ITER, hash: 'SHA-256' },
    raw,
    { name: 'AES-GCM', length: 256 },
    false, ['encrypt', 'decrypt']
  );
}

// version 1 = PBKDF2-SHA256 (legacy); version 2+ = Argon2id
async function deriveKey(password, salt, version) {
  return version >= 2
    ? _deriveKeyArgon2(password, salt)
    : _deriveKeyPBKDF2(password, salt);
}

// ── Binary format helpers ─────────────────────────────────────────────────────
//
//  Offset  Len  Field
//  0       4    Magic "ENCF"
//  4       2    Version (0x0001 = PBKDF2, 0x0002 = Argon2id + AAD)
//  6       2    Flags   0x0000
//  8       4    MetaLen (big-endian)
//  12      16   Salt
//  28      12   Meta-IV
//  40      ML   EncryptedMeta  (AES-GCM ciphertext + 16-byte tag)
//  40+ML   12   Data-IV
//  52+ML   N+16 EncryptedData

function parseHeader(buf) {
  const u8 = new Uint8Array(buf);
  const dv = new DataView(buf instanceof ArrayBuffer ? buf : buf.buffer);
  if (u8[0] !== 0x45 || u8[1] !== 0x4E || u8[2] !== 0x43 || u8[3] !== 0x46)
    throw new Error('BAD_FORMAT');
  return {
    version: dv.getUint16(4, false),
    ML:      dv.getUint32(8, false),
    salt:    u8.slice(12, 28),
    metaIV:  u8.slice(28, 40),
  };
}

// ── Encrypt ───────────────────────────────────────────────────────────────────
// Returns { encBuf: ArrayBuffer, fileId: string }

async function encryptFile(password, fileBuf, name, mime) {
  const fileId = crypto.randomUUID();         // client-generated for AAD binding
  const aad    = ENC.encode(fileId);          // bound to ciphertext — swap detection
  const salt   = crypto.getRandomValues(new Uint8Array(16));
  const metaIV = crypto.getRandomValues(new Uint8Array(12));
  const dataIV = crypto.getRandomValues(new Uint8Array(12));

  const key = await deriveKey(password, salt, 2);

  const metaPlain = ENC.encode(JSON.stringify({
    name, mime,
    size: fileBuf.byteLength,
    uploadedAt: Math.floor(Date.now() / 1000),
  }));
  const metaPadded = new Uint8Array(Math.max(META_PAD, metaPlain.length));
  metaPadded.set(metaPlain);

  const ps = paddedSize(fileBuf.byteLength);
  const dataPadded = new Uint8Array(ps);
  dataPadded.set(new Uint8Array(fileBuf));

  const [encMeta, encData] = await Promise.all([
    crypto.subtle.encrypt({ name: 'AES-GCM', iv: metaIV, additionalData: aad }, key, metaPadded),
    crypto.subtle.encrypt({ name: 'AES-GCM', iv: dataIV, additionalData: aad }, key, dataPadded),
  ]);

  const ML  = encMeta.byteLength;
  const out = new Uint8Array(52 + ML + encData.byteLength);
  const dv  = new DataView(out.buffer);

  out[0]=0x45; out[1]=0x4E; out[2]=0x43; out[3]=0x46; // ENCF
  dv.setUint16(4, 2, false);    // version 2 — Argon2id + AAD
  dv.setUint16(6, 0, false);
  dv.setUint32(8, ML, false);
  out.set(salt,                    12);
  out.set(metaIV,                  28);
  out.set(new Uint8Array(encMeta), 40);
  out.set(dataIV,              40+ML);
  out.set(new Uint8Array(encData), 52+ML);

  return { encBuf: out.buffer, fileId };
}

// ── Decrypt ───────────────────────────────────────────────────────────────────
// fileId is passed as AAD for v2+ files; ignored for legacy v1 files.

async function decryptFile(password, encBuf, fileId) {
  const u8  = new Uint8Array(encBuf);
  const { version, ML, salt, metaIV } = parseHeader(encBuf);

  const encMeta = u8.slice(40, 40 + ML);
  const dataIV  = u8.slice(40 + ML, 52 + ML);
  const encData = u8.slice(52 + ML);

  const key = await deriveKey(password, salt, version);
  const aad = (version >= 2 && fileId) ? ENC.encode(fileId) : undefined;
  const aadParam = aad ? { additionalData: aad } : {};

  let meta;
  try {
    const mb = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: metaIV, ...aadParam }, key, encMeta
    );
    meta = JSON.parse(DEC.decode(mb).replace(/\0+$/, ''));
  } catch { throw new Error('WRONG_PASSWORD'); }

  let plaintext;
  try {
    plaintext = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: dataIV, ...aadParam }, key, encData
    );
  } catch { throw new Error('CORRUPTED'); }

  return { plaintext: plaintext.slice(0, meta.size), meta };
}

// ── v3: chunked encrypt (file.slice — one 64 MiB slice at a time) ────────────
// Takes a File object, not an ArrayBuffer. Calls onProgress(done, total) each chunk.
// Returns { body: Blob, fileId } — body is the complete .enc blob.

async function encryptFileChunked(password, file, name, mime, onProgress) {
  const fileId = crypto.randomUUID();
  const aad    = ENC.encode(fileId);
  const salt   = crypto.getRandomValues(new Uint8Array(16));
  const metaIV = crypto.getRandomValues(new Uint8Array(12));

  const key = await deriveKey(password, salt, 3);

  const metaPlain = ENC.encode(JSON.stringify({
    name, mime, size: file.size, uploadedAt: Math.floor(Date.now() / 1000),
  }));
  const metaPadded = new Uint8Array(Math.max(META_PAD, metaPlain.length));
  metaPadded.set(metaPlain);
  const encMeta = await crypto.subtle.encrypt(
    { name: 'AES-GCM', iv: metaIV, additionalData: aad }, key, metaPadded
  );
  const ML = encMeta.byteLength;

  const header = new Uint8Array(40 + ML);
  const hdv = new DataView(header.buffer);
  header[0]=0x45; header[1]=0x4E; header[2]=0x43; header[3]=0x46; // ENCF
  hdv.setUint16(4, 3, false);  // version 3 — Argon2id + chunked
  hdv.setUint16(6, 0, false);
  hdv.setUint32(8, ML, false);
  header.set(salt, 12);
  header.set(metaIV, 28);
  header.set(new Uint8Array(encMeta), 40);

  const numChunks = Math.ceil(file.size / ENC_CHUNK_SIZE);
  const blobParts = [header];

  for (let i = 0; i < numChunks; i++) {
    const start    = i * ENC_CHUNK_SIZE;
    const sliceBuf = await file.slice(start, Math.min(start + ENC_CHUNK_SIZE, file.size))
                               .arrayBuffer();

    // Zero-pad to exactly ENC_CHUNK_SIZE — hides exact file size; zeros are
    // indistinguishable from random after AES-GCM encryption
    const plain = new Uint8Array(ENC_CHUNK_SIZE);
    plain.set(new Uint8Array(sliceBuf));

    const chunkIV  = crypto.getRandomValues(new Uint8Array(12));
    const chunkAAD = ENC.encode(`${fileId}:${i}`); // binds chunk to position in this file
    const encChunk = await crypto.subtle.encrypt(
      { name: 'AES-GCM', iv: chunkIV, additionalData: chunkAAD }, key, plain
    );

    blobParts.push(chunkIV);
    blobParts.push(new Uint8Array(encChunk));
    onProgress?.(i + 1, numChunks);
  }

  return { body: new Blob(blobParts), fileId };
}

// ── v3: chunked decrypt (range request per 64 MiB chunk) ─────────────────────
// headerEnd = 40 + ML (byte offset where the first chunk starts).
// Returns a Blob of the reassembled plaintext.

async function decryptFileV3(id, key, headerEnd, numChunks, meta, vload) {
  const ON_WIRE = ENC_CHUNK_SIZE + 28; // 12 IV + ENC_CHUNK_SIZE plaintext + 16 GCM tag
  const plaintextParts = [];

  for (let i = 0; i < numChunks; i++) {
    const start = headerEnd + i * ON_WIRE;
    const end   = start + ON_WIRE - 1;
    if (vload) vload.textContent = `Decrypting chunk ${i + 1}/${numChunks}…`;

    const res = await fetch(`/file/${id}`, {
      headers: authHeaders({ Range: `bytes=${start}-${end}` })
    });
    if (!res.ok && res.status !== 206) throw new Error(`HTTP ${res.status}`);

    const raw      = new Uint8Array(await res.arrayBuffer());
    const chunkIV  = raw.slice(0, 12);
    const encChunk = raw.slice(12);
    const chunkAAD = ENC.encode(`${id}:${i}`);

    let plain;
    try {
      plain = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: chunkIV, additionalData: chunkAAD }, key, encChunk
      );
    } catch { throw new Error(i === 0 ? 'WRONG_PASSWORD' : 'CORRUPTED'); }

    // Strip zero-padding from the last chunk using the true size in metadata
    const actualBytes = (i === numChunks - 1)
      ? meta.size - (numChunks - 1) * ENC_CHUNK_SIZE
      : ENC_CHUNK_SIZE;
    plaintextParts.push(new Uint8Array(plain, 0, actualBytes));
  }

  return new Blob(plaintextParts, { type: meta.mime });
}

// ── Fetch metadata only (range request for first 1 KB) ───────────────────────

async function fetchMeta(id, password) {
  const res = await fetch(`/file/${id}`, {
    headers: authHeaders({ Range: 'bytes=0-1023' })
  });
  if (!res.ok && res.status !== 206) throw new Error(`HTTP ${res.status}`);

  const buf = await res.arrayBuffer();
  const u8  = new Uint8Array(buf);
  const { version, ML, salt, metaIV } = parseHeader(buf);

  if (40 + ML > buf.byteLength) throw new Error('META_TOO_LARGE');

  const encMeta = u8.slice(40, 40 + ML);
  const key = await deriveKey(password, salt, version);
  const aad = (version >= 2) ? ENC.encode(id) : undefined;
  const aadParam = aad ? { additionalData: aad } : {};

  try {
    const mb = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: metaIV, ...aadParam }, key, encMeta
    );
    return JSON.parse(DEC.decode(mb).replace(/\0+$/, ''));
  } catch { throw new Error('WRONG_PASSWORD'); }
}

// ── Blob URL cleanup ──────────────────────────────────────────────────────────

const liveUrls = [];
function trackUrl(url) { liveUrls.push(url); return url; }
function revokeAll()   { while (liveUrls.length) URL.revokeObjectURL(liveUrls.pop()); }

// ── UI helpers ────────────────────────────────────────────────────────────────

function getPw() {
  const v = document.getElementById('pw').value.trim();
  if (!v) { alert('Enter a password first.'); return null; }
  return v;
}

function checkStrength(password) {
  const bits = passwordEntropy(password);
  if (bits < 60) {
    alert(
      `Password is too weak (${bits.toFixed(0)} bits).\n\n` +
      `Use a longer passphrase with mixed characters.\n` +
      `Recommended: a 6-word diceware passphrase (≥77 bits).`
    );
    return false;
  }
  return true;
}

function setStatus(msg, cls) {
  const el = document.getElementById('up-status');
  el.textContent = msg;
  el.className = `status ${cls || ''}`;
}

// ── Session management ────────────────────────────────────────────────────────

let sessionTimer    = null;
let countdownTimer  = null;
let sessionDeadline = 0;

function updateSessionUI() {
  const hasPw = !!document.getElementById('pw').value;
  const cd  = document.getElementById('session-countdown');
  const btn = document.getElementById('lock-btn');
  cd.style.display  = hasPw ? '' : 'none';
  btn.style.display = hasPw ? '' : 'none';
}

function updateCountdown() {
  const el = document.getElementById('session-countdown');
  const remaining = Math.max(0, Math.ceil((sessionDeadline - Date.now()) / 1000));
  el.textContent = `Auto-lock in ${remaining}s`;
}


function clearSession(showNotice) {
  clearTimeout(sessionTimer);
  clearInterval(countdownTimer);
  sessionTimer = countdownTimer = null;

  closeViewer();
  document.getElementById('pw').value = '';
  document.getElementById('vkb-counter').textContent = '';
  updateStrengthBar('');
  updateSessionUI();
  for (const k of Object.keys(cache)) delete cache[k];
  loadFiles();

  if (showNotice !== false) {
    const notice = document.getElementById('timeout-notice');
    notice.style.display = '';
    setTimeout(() => { notice.style.display = 'none'; }, 7000);
  }
}

function resetSessionTimer() {
  clearTimeout(sessionTimer);
  clearInterval(countdownTimer);
  sessionDeadline = Date.now() + SESSION_MS;
  sessionTimer   = setTimeout(() => clearSession(true), SESSION_MS);
  countdownTimer = setInterval(updateCountdown, 500);
  updateCountdown();
}

document.getElementById('lock-btn').addEventListener('click', () => clearSession(false));

// ── File list ─────────────────────────────────────────────────────────────────

async function loadFiles() {
  const res = await fetch('/files', { headers: authHeaders() });
  if (!res.ok) {
    if (res.status === 401)
      console.warn('[vault] 401 on /files — token may have changed, reload the page');
    else
      console.error('[vault] Could not load file list:', res.status);
    return;
  }
  const { files } = await res.json();

  const list  = document.getElementById('file-list');
  const empty = document.getElementById('empty-msg');
  list.innerHTML = '';
  empty.style.display = files.length ? 'none' : '';

  for (const id of files) {
    const known = cache[id];
    const li = document.createElement('li');

    const nameEl = document.createElement('span');
    nameEl.className = known ? 'fname named' : 'fname';
    nameEl.textContent = known ? known.name : `${id.slice(0, 8)}…`;
    nameEl.title = id;

    const viewBtn = document.createElement('button');
    viewBtn.className = 'ghost';
    viewBtn.textContent = 'View';
    viewBtn.onclick = () => viewFile(id, nameEl);

    const delBtn = document.createElement('button');
    delBtn.className = 'danger';
    delBtn.textContent = '×';
    delBtn.title = 'Delete';
    delBtn.onclick = () => deleteFile(id, li);

    li.append(nameEl, viewBtn, delBtn);
    list.appendChild(li);
  }
}

// ── Trash ─────────────────────────────────────────────────────────────────────

async function loadTrash() {
  const res = await fetch('/trash', { headers: authHeaders() });
  if (!res.ok) return;
  const { files } = await res.json();
  const card  = document.getElementById('trash-card');
  const list  = document.getElementById('trash-list');
  const empty = document.getElementById('trash-empty-msg');
  card.style.display = files.length ? '' : 'none';
  empty.style.display = files.length ? 'none' : '';
  list.innerHTML = '';
  for (const item of files) {
    const { id, trashed_at } = item;
    const known = cache[id];
    const li = document.createElement('li');
    li.style.cssText = 'display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)';
    const nameEl = document.createElement('span');
    nameEl.className = known ? 'fname named' : 'fname';
    nameEl.textContent = known ? known.name : `${id.slice(0, 8)}…`;
    nameEl.title = id;
    nameEl.style.flex = '1';
    const date = new Date(trashed_at * 1000).toLocaleDateString();
    const dateEl = document.createElement('span');
    dateEl.style.cssText = 'font-size:10px;color:var(--muted);white-space:nowrap';
    dateEl.textContent = date;
    const restoreBtn = document.createElement('button');
    restoreBtn.className = 'ghost';
    restoreBtn.textContent = 'Restore';
    restoreBtn.onclick = () => restoreFile(id, li);
    const permDelBtn = document.createElement('button');
    permDelBtn.className = 'danger';
    permDelBtn.textContent = '×';
    permDelBtn.title = 'Delete permanently';
    permDelBtn.onclick = () => permanentDelete(id, li);
    li.append(nameEl, dateEl, restoreBtn, permDelBtn);
    list.appendChild(li);
  }
}

async function restoreFile(id, li) {
  const name = cache[id] ? cache[id].name : id.slice(0, 8) + '…';
  if (!confirm(`Restore "${name}" to vault?`)) return;
  const res = await fetch(`/trash/${id}/restore`, { method: 'POST', headers: authHeaders() });
  if (res.ok || res.status === 404) {
    li.remove();
    if (!document.getElementById('trash-list').children.length)
      document.getElementById('trash-card').style.display = 'none';
    await loadFiles();
  } else {
    alert(`Restore failed: ${res.status}`);
  }
}

async function permanentDelete(id, li) {
  const name = cache[id] ? cache[id].name : id.slice(0, 8) + '…';
  if (!confirm(`Permanently delete "${name}"?\n\nThis cannot be undone.`)) return;
  const res = await fetch(`/trash/${id}`, { method: 'DELETE', headers: authHeaders() });
  if (res.ok || res.status === 404) {
    delete cache[id];
    li.remove();
    if (!document.getElementById('trash-list').children.length)
      document.getElementById('trash-card').style.display = 'none';
  } else {
    alert(`Delete failed: ${res.status}`);
  }
}

// ── Upload ────────────────────────────────────────────────────────────────────

document.getElementById('upload-btn').addEventListener('click', async () => {
  const password = getPw();
  if (!password) return;
  if (!checkStrength(password)) return;

  const picker = document.getElementById('picker');
  const files  = picker.files;
  if (!files.length) { alert('Choose at least one file.'); return; }

  const btn  = document.getElementById('upload-btn');
  const prog = document.getElementById('prog');
  const bar  = document.getElementById('bar');

  btn.disabled = true;
  prog.style.display = '';
  let failed = 0;

  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    bar.style.width = `${Math.round(i / files.length * 100)}%`;
    setStatus(`Deriving Argon2id key for ${f.name} (${i + 1}/${files.length}) — takes ~5s…`, 'warn');
    await new Promise(r => setTimeout(r, 30));

    try {
      let encBody, fileId;
      if (f.size > ENC_CHUNK_SIZE) {
        // v3 — chunked: read one 64 MiB slice at a time, never the whole file
        const result = await encryptFileChunked(
          password, f, f.name, f.type || 'application/octet-stream',
          (done, total) => {
            setStatus(`Encrypting ${f.name} — chunk ${done}/${total}…`);
            bar.style.width = `${Math.round((done / total) * 85)}%`;
          }
        );
        encBody = result.body;
        fileId  = result.fileId;
      } else {
        // v2 — small file, existing single-block path
        const fileBuf = await f.arrayBuffer();
        const result = await encryptFile(
          password, fileBuf, f.name, f.type || 'application/octet-stream'
        );
        encBody = result.encBuf;
        fileId  = result.fileId;
      }
      setStatus(`Uploading ${f.name}…`);
      const res = await fetch('/upload', {
        method: 'POST',
        headers: authHeaders({
          'Content-Type': 'application/octet-stream',
          'X-File-ID': fileId,
        }),
        body: encBody,
      });
      if (!res.ok) throw new Error(`Server ${res.status}`);
      const { id } = await res.json();
      cache[id] = { name: f.name, mime: f.type || 'application/octet-stream' };
    } catch (e) {
      setStatus(`Failed: ${e.message}`, 'err');
      failed++;
    }
  }

  bar.style.width = '100%';
  if (!failed) setStatus(`${files.length} file(s) uploaded.`, 'ok');
  picker.value = '';
  btn.disabled = false;
  setTimeout(() => { prog.style.display = 'none'; bar.style.width = '0'; }, 1200);
  await loadFiles();
});

// ── Reveal names ──────────────────────────────────────────────────────────────

document.getElementById('reveal-btn').addEventListener('click', async () => {
  const password = getPw();
  if (!password) return;

  const items = document.querySelectorAll('#file-list li');
  if (!items.length) return;

  const btn = document.getElementById('reveal-btn');
  btn.disabled = true;
  btn.textContent = 'Revealing…';

  let ok = 0, fail = 0;
  for (const li of items) {
    const nameEl = li.querySelector('.fname');
    const id = nameEl.title;
    if (cache[id]) {
      ok++;
      nameEl.textContent = cache[id].name;
      nameEl.className = 'fname named';
      continue;
    }
    try {
      const meta = await fetchMeta(id, password);
      cache[id] = meta;
      nameEl.textContent = meta.name;
      nameEl.className = 'fname named';
      ok++;
    } catch { fail++; }
  }

  btn.disabled = false;
  btn.textContent = 'Reveal Names';
  if (fail && !ok) alert('Wrong password — could not decrypt any names.');
  else if (fail) console.warn(`[vault] ${fail} file(s) could not be decrypted`);
});

// ── Refresh ───────────────────────────────────────────────────────────────────

document.getElementById('refresh-btn').addEventListener('click', loadFiles);
document.getElementById('trash-refresh-btn').addEventListener('click', loadTrash);

// ── View ──────────────────────────────────────────────────────────────────────

async function viewFile(id, nameEl) {
  const password = getPw();
  if (!password) return;

  const overlay = document.getElementById('viewer');
  const vname   = document.getElementById('vname');
  const vload   = document.getElementById('vloading');
  const vcont   = document.getElementById('vcontent');

  revokeAll();
  vcont.innerHTML = '';
  vload.style.display = '';
  vload.textContent = 'Downloading…';
  vname.textContent = cache[id] ? cache[id].name : `${id.slice(0, 8)}…`;
  overlay.classList.add('open');

  try {
    // Step 1: fetch only the header (first 1 KB) to check version before downloading
    vload.textContent = 'Reading header…';
    const hdrRes = await fetch(`/file/${id}`, {
      headers: authHeaders({ Range: 'bytes=0-1023' })
    });
    if (!hdrRes.ok && hdrRes.status !== 206) throw new Error(`HTTP ${hdrRes.status}`);
    const hdrBuf = await hdrRes.arrayBuffer();
    const hdr    = parseHeader(hdrBuf);

    let meta, blob;

    if (hdr.version === 3) {
      // v3 — chunked: derive key once, decrypt metadata, then fetch chunks
      vload.textContent = 'Deriving key…';
      const key     = await deriveKey(password, hdr.salt, 3);
      const metaAAD = ENC.encode(id);
      const hdrU8   = new Uint8Array(hdrBuf);
      try {
        const mb = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv: hdr.metaIV, additionalData: metaAAD },
          key, hdrU8.slice(40, 40 + hdr.ML)
        );
        meta = JSON.parse(DEC.decode(mb).replace(/\0+$/, ''));
      } catch { throw new Error('WRONG_PASSWORD'); }

      const numChunks = Math.ceil(meta.size / ENC_CHUNK_SIZE);
      blob = await decryptFileV3(id, key, 40 + hdr.ML, numChunks, meta, vload);

    } else {
      // v1/v2 — single block: download full file, decrypt in one shot
      vload.textContent = 'Downloading…';
      const res = await fetch(`/file/${id}`, { headers: authHeaders() });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      vload.textContent = 'Decrypting…';
      const encBuf = await res.arrayBuffer();
      const result = await decryptFile(password, encBuf, id);
      meta = result.meta;
      blob = new Blob([result.plaintext], { type: meta.mime });
    }

    cache[id] = meta;
    vname.textContent = meta.name;
    if (nameEl) { nameEl.textContent = meta.name; nameEl.className = 'fname named'; }
    vload.style.display = 'none';

    const mime  = meta.mime || 'application/octet-stream';
    const mtype = mime.split('/')[0];

    if (mtype === 'text') {
      const pre = document.createElement('pre');
      pre.textContent = await blob.text();
      vcont.appendChild(pre);
      return;
    }

    const url  = trackUrl(URL.createObjectURL(blob));

    if (mtype === 'image') {
      const img = document.createElement('img');
      img.src = url; img.alt = meta.name;
      vcont.appendChild(img);
    } else if (mtype === 'audio') {
      const audio = document.createElement('audio');
      audio.controls = true; audio.src = url;
      vcont.appendChild(audio);
    } else if (mtype === 'video') {
      const video = document.createElement('video');
      video.controls = true; video.src = url;
      vcont.appendChild(video);
    } else if (mime === 'application/pdf') {
      const embed = document.createElement('embed');
      embed.src = url; embed.type = 'application/pdf';
      vcont.appendChild(embed);
    } else {
      const a = document.createElement('a');
      a.href = url; a.download = meta.name; a.click();
      const p = document.createElement('p');
      p.className = 'dl-msg';
      p.textContent = `Downloading ${meta.name}…`;
      vcont.appendChild(p);
      setTimeout(revokeAll, 8000);
    }

  } catch (e) {
    vload.style.display = 'none';
    const p = document.createElement('p');
    p.style.cssText = 'color:var(--danger);padding:30px 0;font-size:12px';
    p.textContent = e.message === 'WRONG_PASSWORD'
      ? 'Decryption failed — wrong password or corrupted file.'
      : `Error: ${e.message}`;
    vcont.appendChild(p);
  }
}

// ── Close viewer ──────────────────────────────────────────────────────────────

function closeViewer() {
  revokeAll();
  document.getElementById('viewer').classList.remove('open');
  document.getElementById('vcontent').innerHTML = '';
  document.getElementById('vloading').style.display = 'none';
  navigator.clipboard?.writeText('').catch(() => {});
}

document.getElementById('vclose').addEventListener('click', closeViewer);
document.getElementById('viewer').addEventListener('click', e => {
  if (e.target === document.getElementById('viewer')) closeViewer();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeViewer(); });
window.addEventListener('beforeunload', revokeAll);

// ── Delete ────────────────────────────────────────────────────────────────────

async function deleteFile(id, li) {
  const name = cache[id] ? cache[id].name : id.slice(0, 8) + '…';
  if (!confirm(`Move "${name}" to Trash?\n\nRestoration available for ${TRASH_DAYS} days.`)) return;

  const res = await fetch(`/file/${id}`, {
    method: 'DELETE',
    headers: authHeaders(),
  });
  if (res.ok || res.status === 404) {
    delete cache[id];
    li.remove();
    document.getElementById('empty-msg').style.display =
      document.getElementById('file-list').children.length ? 'none' : '';
    loadTrash();
  } else {
    alert(`Delete failed: ${res.status}`);
  }
}

// ── URL fetch ─────────────────────────────────────────────────────────────────

document.getElementById('url-btn').addEventListener('click', async () => {
  const password = getPw();
  if (!password) return;
  if (!checkStrength(password)) return;

  const urlVal = document.getElementById('url-input').value.trim();
  if (!urlVal) { alert('Enter a URL.'); return; }

  const btn  = document.getElementById('url-btn');
  const prog = document.getElementById('prog');
  const bar  = document.getElementById('bar');

  btn.disabled = true;
  prog.style.display = '';
  bar.style.width = '10%';
  setStatus('Fetching from URL…');

  try {
    const res = await fetch('/fetch', {
      method: 'POST',
      headers: authHeaders({
        'Content-Type': 'text/plain; charset=utf-8',
        'Content-Length': ENC.encode(urlVal).length,
      }),
      body: urlVal,
    });

    if (!res.ok) throw new Error((await res.text()) || `Server error ${res.status}`);

    bar.style.width = '45%';
    setStatus('Deriving Argon2id key — takes ~5s…', 'warn');
    await new Promise(r => setTimeout(r, 30));

    const mime    = (res.headers.get('Content-Type') || 'application/octet-stream').split(';')[0].trim();
    const rawName = res.headers.get('X-Filename') || 'download';
    const name    = decodeURIComponent(rawName);
    const fileBuf = await res.arrayBuffer();
    setStatus('Encrypting…');

    bar.style.width = '65%';
    const { encBuf, fileId } = await encryptFile(password, fileBuf, name, mime);
    bar.style.width = '85%';
    setStatus('Uploading…');

    const up = await fetch('/upload', {
      method: 'POST',
      headers: authHeaders({
        'Content-Type': 'application/octet-stream',
        'X-File-ID': fileId,
      }),
      body: encBuf,
    });
    if (!up.ok) throw new Error(`Upload error ${up.status}`);

    const { id } = await up.json();
    cache[id] = { name, mime };
    bar.style.width = '100%';
    setStatus(`"${name}" encrypted and saved.`, 'ok');
    document.getElementById('url-input').value = '';
    await loadFiles();
    setTimeout(() => { prog.style.display = 'none'; bar.style.width = '0'; }, 1200);

  } catch (e) {
    setStatus(`Failed: ${e.message}`, 'err');
    prog.style.display = 'none';
  }

  btn.disabled = false;
});

// ── Virtual keyboard ──────────────────────────────────────────────────────────

const VK_CHARS = [
  ...'abcdefghijklmnopqrstuvwxyz',
  ...'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  ...'0123456789',
  ...'!@#$%^&*()-_=+[]{}:;<>,.?/|\\`~',
];

function shuffled(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = crypto.getRandomValues(new Uint32Array(1))[0] % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function updateVkCounter() {
  const n = document.getElementById('pw').value.length;
  document.getElementById('vkb-counter').textContent =
    n ? `${n} character${n !== 1 ? 's' : ''} entered` : '';
}

function buildVirtualKeyboard() {
  const panel   = document.getElementById('vkb-panel');
  const pwField = document.getElementById('pw');
  panel.innerHTML = '';

  for (const ch of shuffled(VK_CHARS)) {
    const btn = document.createElement('button');
    btn.className = 'vk-key';
    btn.textContent = ch;
    btn.tabIndex = -1;
    btn.addEventListener('mousedown', e => {
      e.preventDefault();
      pwField.value += ch;
      updateVkCounter();
      updateStrengthBar(pwField.value);
      updateSessionUI();
    });
    panel.appendChild(btn);
  }

  for (const [label, cls, action] of [
    ['⌫', 'vk-key vk-bs',    () => { pwField.value = pwField.value.slice(0, -1); }],
    ['Clear', 'vk-key vk-clear', () => { pwField.value = ''; }],
  ]) {
    const btn = document.createElement('button');
    btn.className = cls;
    btn.textContent = label;
    btn.tabIndex = -1;
    btn.addEventListener('mousedown', e => {
      e.preventDefault();
      action();
      updateVkCounter();
      updateStrengthBar(pwField.value);
      updateSessionUI();
    });
    panel.appendChild(btn);
  }

  updateVkCounter();
}

document.getElementById('vkb-btn').addEventListener('click', () => {
  const panel = document.getElementById('vkb-panel');
  if (panel.classList.toggle('open')) buildVirtualKeyboard();
});

document.getElementById('pw').addEventListener('input', () => {
  updateVkCounter();
  updateStrengthBar(document.getElementById('pw').value);
  updateSessionUI();
});

// ── Activity → reset session timer ───────────────────────────────────────────

['mousemove', 'keydown', 'mousedown', 'touchstart'].forEach(ev =>
  document.addEventListener(ev, resetSessionTimer, { passive: true })
);

// ── Init ──────────────────────────────────────────────────────────────────────

resetSessionTimer();
loadFiles();
loadTrash();
